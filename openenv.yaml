name: it-support-ticket-triage
version: "1.0.0"
description: IT support ticket triage RL environment
tags:
  - openenv
api:
  base_url: https://nikhilbabuy-openenv-ticket-triage.hf.space
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
action_space:
  type: structured_json
observation_space:
  type: structured_json
tasks:
  - id: EASY
    difficulty: easy
    max_steps: 1
  - id: MEDIUM
    difficulty: medium
    max_steps: 1
  - id: HARD
    difficulty: hard
    max_steps: 3
reward:
  range: [0.0, 1.0]
  type: dense
